# Minimalist Hyprlock Configuration
# Based on https://wiki.hypr.land/Hypr-Ecosystem/hyprlock/

background {
    monitor =
    # Use 'screenshot' for a blurred view of your current desktop, 
    # or replace with an absolute path to an image like /home/havoc/Pictures/wall.png
    path = screenshot
    color = rgba(25, 20, 20, 1.0)

    # Blur options (taken from Hyprland blur variables)
    blur_passes = 3             # Higher number means more intense blur
    blur_size = 8               # Radial size of the blur
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.25            # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.35         # Scale of dots' absolute size, -1.0 - 1.0
    dots_center = true
    dots_rounding = -1          # -1 default circle, -2 follow input-field rounding
    
    # Text box colors
    outer_color = rgba(200, 200, 200, 0.15)
    inner_color = rgba(20, 20, 20, 0.35)
    font_color = rgb(235, 235, 235)
    
    # Setup placeholder and animations
    fade_on_empty = true
    fade_timeout = 1000         # Milliseconds before fade_on_empty is triggered
    placeholder_text =          # Empty string for a completely clean look
    hide_input = false
    rounding = -1               # -1 means complete rounding (oval/pill shape)
    
    # Custom state colors
    check_color = rgba(200, 200, 200, 0.6)
    fail_color = rgb(204, 34, 34)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    fail_timeout = 2000 

    position = 0, 0
    halign = center
    valign = center
}
